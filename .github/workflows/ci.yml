name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual release trigger (e.g. after a GITHUB_TOKEN-merged PR)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run size
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Automatic releasing: every push to main becomes a patch release, versioned
  # from git tags (no version-bump commits, so no workflow loops). Commit
  # message markers steer it: [skip release], [release minor], [release major].
  release:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Compute next version from tags
        id: version
        run: |
          set -euo pipefail
          msg="$(git log -1 --pretty=%B)"
          if echo "$msg" | grep -qiF '[skip release]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "release skipped by commit message"
            exit 0
          fi
          latest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            next="$(node -p "require('./package.json').version")"
          else
            base="${latest#v}"
            IFS=. read -r MA MI PA <<< "$base"
            if echo "$msg" | grep -qiF '[release major]'; then
              next="$((MA+1)).0.0"
            elif echo "$msg" | grep -qiF '[release minor]'; then
              next="$MA.$((MI+1)).0"
            else
              next="$MA.$MI.$((PA+1))"
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "releasing v$next (previous: ${latest:-none})"

      - name: Build with release version
        if: steps.version.outputs.skip == 'false'
        run: |
          npm ci
          WIDGET_VERSION="${{ steps.version.outputs.next }}" npm run build
          npm run size

      - name: Create tag + GitHub release with dist
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.next }}" \
            dist/allquiet-status-widget.js \
            dist/allquiet-status-widget.js.map \
            --title "v${{ steps.version.outputs.next }}" \
            --generate-notes

      # Publishes the same build to GitHub Pages so the widget has a
      # ready-to-use CDN URL with no external hosting required.
      - name: Prepare Pages site
        if: steps.version.outputs.skip == 'false'
        run: |
          mkdir -p _site
          cp dist/allquiet-status-widget.js dist/allquiet-status-widget.js.map _site/

      - name: Configure Pages
        if: steps.version.outputs.skip == 'false'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.version.outputs.skip == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.version.outputs.skip == 'false'
        id: deployment
        uses: actions/deploy-pages@v4
